modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
displayTest = "IGNORE_SERVER_VERSION"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "jei"
mandatory = true
versionRange = "[15.20.0.130,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies."${mod_id}"]]
modId = "gateways"
mandatory = true
versionRange = "[4.2.6,)"
ordering = "AFTER"
side = "BOTH"
